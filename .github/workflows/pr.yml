name: PR Checks

# AGT-658 — Fork-PR isolation from the signing/release fleet.
#
# Once this repo is public, a fork PR's code (npm lifecycle scripts, cargo build
# scripts, test code, `playwright install`) executes on whatever runner picks up
# these jobs. That code MUST NEVER run on the self-hosted fleet that holds the
# Tauri updater signing key and the Apple Developer cert (release.yml,
# staging.yml). Two controls enforce that:
#
#   1. RUNNER ISOLATION (enforced here, in YAML): every job below runs on
#      GitHub-hosted `ubuntu-24.04-arm` ephemeral VMs — zero contact with the
#      self-hosted signing/release fleet, fresh workspace every run, free for
#      public repos. No self-hosted PR pool exists or is needed; internal
#      development merges via the stamp flow and never opens GitHub PRs, so
#      these jobs only fire for fork PRs.
#   2. APPROVAL GATE (repo setting, required): enable Settings → Actions →
#      General → "Fork pull request workflows from outside collaborators" →
#      "Require approval for all outside collaborators" (or first-time
#      contributors). This pauses fork-PR runs until a maintainer approves, so
#      untrusted code never executes — even on ephemeral runners — unattended.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # Detect which paths changed to conditionally run jobs
  changes:
    name: Detect Changes
    runs-on: ubuntu-24.04-arm
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        id: filter
        with:
          filters: |
            rust:
              - 'src-tauri/**'
              - 'shared/**'
            frontend:
              - 'src/**'
              - 'shared/**'
              - 'packages/**'
              - 'package.json'
              - 'package-lock.json'
              - 'vite.config.ts'
              - 'vite.config.e2e.ts'
              - 'tsconfig.json'
              - 'e2e/**'
              - 'playwright.config.ts'

  # AGT-650: the "migrations only in queries-service" policy check is gone
  # with the cloud data path — local schema lives in
  # src-tauri/src/local_store/migrations.rs (see docs/local-store.md).

  test-rust:
    name: Rust Tests
    needs: changes
    if: ${{ needs.changes.outputs.rust == 'true' }}
    runs-on: ubuntu-24.04-arm
    env:
      CARGO_INCREMENTAL: 0
      CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install Tauri Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable (pinned; Dependabot bumps)

      - name: Cache Rust build
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

  test-frontend:
    name: Frontend Tests
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          npm install @rollup/rollup-linux-arm64-gnu @tailwindcss/oxide-linux-arm64-gnu --no-save

      - name: Run frontend tests
        run: npm run test:ui

  typecheck:
    name: TypeScript Check
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          npm install @rollup/rollup-linux-arm64-gnu @tailwindcss/oxide-linux-arm64-gnu --no-save

      - name: TypeScript check
        run: npm run check

  test-e2e:
    name: E2E Tests
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          npm install @rollup/rollup-linux-arm64-gnu @tailwindcss/oxide-linux-arm64-gnu --no-save

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  build-frontend:
    name: Frontend Build
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          npm install @rollup/rollup-linux-arm64-gnu @tailwindcss/oxide-linux-arm64-gnu --no-save

      - name: Build frontend
        run: npm run build

      - name: Verify build output
        run: |
          if [ ! -d "build" ]; then
            echo "ERROR: build directory not found"
            exit 1
          fi
          if [ ! -f "build/index.html" ]; then
            echo "ERROR: build/index.html not found"
            exit 1
          fi
          echo "Frontend build successful"
          ls -la build/
