name: PR Checks

# AGT-658 — Fork-PR isolation from the signing/release fleet.
#
# Once this repo is public, a fork PR's code (npm lifecycle scripts, cargo build
# scripts, test code, `playwright install`) executes on whatever runner picks up
# these jobs. That code MUST NEVER run on the self-hosted fleet that holds the
# Tauri updater signing key and the Apple Developer cert (release.yml,
# staging.yml). Two controls enforce that:
#
#   1. RUNNER-POOL ISOLATION (enforced here, in YAML): every job below targets
#      the `pr-isolated` label. The signing/release runners carry
#      `[self-hosted, Linux|macOS, ARM64]` but NOT `pr-isolated`, so GitHub can
#      never schedule a PR job onto a signing-fleet host. The `pr-isolated` pool
#      must be provisioned as an UNPRIVILEGED host (no signing secrets, no Apple
#      keychain) — see HUMAN-ITEMS.md. (Alternative if you'd rather run zero
#      self-hosted PR runners: switch these jobs to GitHub-hosted
#      `ubuntu-24.04-arm` ephemeral runners and add toolchain-setup steps.)
#   2. APPROVAL GATE (repo setting, required): enable Settings → Actions →
#      General → "Fork pull request workflows from outside collaborators" →
#      "Require approval for all outside collaborators" (or first-time
#      contributors). This pauses fork-PR runs until a maintainer approves, so
#      untrusted code never executes — even on the isolated pool — unattended.
#
# `clean: false` was also removed below (AGT-658 AC2): a shared self-hosted
# workspace with `clean: false` lets one run poison the next run's checkout.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # Detect which paths changed to conditionally run jobs
  changes:
    name: Detect Changes
    runs-on: [self-hosted, Linux, ARM64, pr-isolated]
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        id: filter
        with:
          filters: |
            rust:
              - 'src-tauri/**'
              - 'shared/**'
            frontend:
              - 'src/**'
              - 'shared/**'
              - 'packages/**'
              - 'package.json'
              - 'package-lock.json'
              - 'vite.config.ts'
              - 'vite.config.e2e.ts'
              - 'tsconfig.json'
              - 'e2e/**'
              - 'playwright.config.ts'

  # AGT-650: the "migrations only in queries-service" policy check is gone
  # with the cloud data path — local schema lives in
  # src-tauri/src/local_store/migrations.rs (see docs/local-store.md).

  test-rust:
    name: Rust Tests
    needs: changes
    if: ${{ needs.changes.outputs.rust == 'true' }}
    runs-on: [self-hosted, Linux, ARM64, pr-isolated]
    env:
      CARGO_INCREMENTAL: 0
      CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
      CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: clang
      CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_RUSTFLAGS: "-C link-arg=-fuse-ld=mold"
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

  test-frontend:
    name: Frontend Tests
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: [self-hosted, Linux, ARM64, pr-isolated]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install dependencies
        run: |
          npm ci
          npm install @rollup/rollup-linux-arm64-gnu @tailwindcss/oxide-linux-arm64-gnu --no-save

      - name: Run frontend tests
        run: npm run test:ui

  typecheck:
    name: TypeScript Check
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: [self-hosted, Linux, ARM64, pr-isolated]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install dependencies
        run: |
          npm ci
          npm install @rollup/rollup-linux-arm64-gnu @tailwindcss/oxide-linux-arm64-gnu --no-save

      - name: TypeScript check
        run: npm run check

  test-e2e:
    name: E2E Tests
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: [self-hosted, Linux, ARM64, pr-isolated]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install dependencies
        run: |
          npm ci
          npm install @rollup/rollup-linux-arm64-gnu @tailwindcss/oxide-linux-arm64-gnu --no-save

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  build-frontend:
    name: Frontend Build
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: [self-hosted, Linux, ARM64, pr-isolated]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install dependencies
        run: |
          npm ci
          npm install @rollup/rollup-linux-arm64-gnu @tailwindcss/oxide-linux-arm64-gnu --no-save

      - name: Build frontend
        run: npm run build

      - name: Verify build output
        run: |
          if [ ! -d "build" ]; then
            echo "ERROR: build directory not found"
            exit 1
          fi
          if [ ! -f "build/index.html" ]; then
            echo "ERROR: build/index.html not found"
            exit 1
          fi
          echo "Frontend build successful"
          ls -la build/
