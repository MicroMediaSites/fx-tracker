# Custom self-hosted runner labels used in this repo's workflows.
# actionlint can't know these exist, so declare them here to avoid false
# "unknown label" warnings.
#   windows-latest-l - larger GitHub-hosted Windows runner (staging.yml, disabled).
#   ubuntu-24.04-arm - GitHub-hosted ARM runner (pr.yml); declared in case the
#                      installed actionlint predates the arm64 hosted runners.
self-hosted-runner:
  labels:
    - windows-latest-l
    - ubuntu-24.04-arm
