# wickd log rotation (macOS newsyslog) — AGT-629, optional.
#
# `wickd stream` and `wickd watch --auto` append NDJSON to ~/Library/Logs/wickd
# indefinitely; a busy hub can grow those files without bound. This drops-in a
# newsyslog rule so macOS's periodic `newsyslog` rotates them.
#
# Install (system-wide newsyslog reads /etc/newsyslog.d):
#   sed "s|__LOG_DIR__|$HOME/Library/Logs/wickd|g" wickd.newsyslog.conf \
#     | sudo tee /etc/newsyslog.d/wickd.conf >/dev/null
#   sudo newsyslog -nv   # dry-run: show what WOULD rotate
#
# Columns: logfilename [owner:group] mode count size when flags
#   mode 644, keep 7 rotations, rotate at 10 MB (size in KB), * = size-triggered
#   only, J = compress rotated files with bzip2, G = treat path as a glob so a
#   single rule covers every stream.* / watch.<slug>.* file.

__LOG_DIR__/stream.out.log    644  7  10240  *  GJ
__LOG_DIR__/stream.err.log    644  7  10240  *  GJ
__LOG_DIR__/watch.*.out.log   644  7  10240  *  GJ
__LOG_DIR__/watch.*.err.log   644  7  10240  *  GJ
